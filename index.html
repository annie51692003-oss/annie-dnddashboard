<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Annie Dashboard</title>

<style>

body{
  margin:0;
  background:#f5f6f8;
  padding-top:16px;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(6,auto);
  grid-auto-flow:column;

  gap:8px;

  max-width:420px;

  margin:auto;
}

.update{
  text-align:center;
  color:#999;
  font-size:10px;

  margin-top:12px;
  margin-bottom:8px;
}

.card{
  background:white;
  border-radius:10px;
  padding:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

.title{
  font-size:11px;
  color:#666;
}

.value{
  font-size:18px;
  font-weight:700;
  margin-top:4px;
}

.loading{
  color:#999;
}

</style>

</head>

<body>

<div class="container">

  <div class="card">
    <div class="title">力量調整</div>
    <div id="STRadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">敏捷調整</div>
    <div id="DEXadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">體質調整</div>
    <div id="CONadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">智力調整</div>
    <div id="INTadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">感知調整</div>
    <div id="WISadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">魅力調整</div>
    <div id="CHAadj" class="value loading">
      Loading...
    </div>
  </div>

    <div class="card">
    <div class="title">力量豁免</div>
    <div id="STRept" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">敏捷豁免</div>
    <div id="DEXept" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">體質豁免</div>
    <div id="CONept" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">智力豁免</div>
    <div id="INTept" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">感知豁免</div>
    <div id="WISept" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">魅力豁免</div>
    <div id="CHAept" class="value loading">
      Loading...
    </div>
  </div>
  
  <div id="updateTime" class="update">
  </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby4IFQ2_5x9Qwr4TdqZhwkbeYa-vVQd8bD5SDwDyQnkibPfJwppi1RH1vUaHWL5KcEEEw/exec";

fetch(API_URL)
  .then(response => response.json())
  .then(data => {

    document.getElementById("STRadj")
      .innerText = data.STRadj;

    document.getElementById("DEXadj")
      .innerText = data.DEXadj;

    document.getElementById("CONadj")
      .innerText = data.CONadj;

    document.getElementById("INTadj")
      .innerText = data.INTadj;

    document.getElementById("WISadj")
      .innerText = data.WISadj;

    document.getElementById("CHAadj")
      .innerText = data.CHAadj;

    document.getElementById("STRept")
      .innerText = data.STRept;

    document.getElementById("DEXept")
      .innerText = data.DEXept;

    document.getElementById("CONept")
      .innerText = data.CONept;

    document.getElementById("INTept")
      .innerText = data.INTept;

    document.getElementById("WISept")
      .innerText = data.WISept;

    document.getElementById("CHAept")
      .innerText = data.CHAept;

    document.getElementById("updateTime")
      .innerText = "更新時間：" + data.updateTime;

  })
  .catch(error => {

    document.getElementById("updateTime")
      .innerText = "資料載入失敗";

    console.error(error);

  });

</script>

</body>
</html>
