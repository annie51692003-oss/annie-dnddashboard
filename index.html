<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Annie Dashboard</title>

<style>

body{
  margin:0;
  background:#f5f6f8;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.container{
  max-width:600px;
  margin:auto;
  padding:16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:20px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.title{
  color:#666;
  font-size:14px;
}

.value{
  margin-top:8px;
  font-size:32px;
  font-weight:700;
}

.update{
  text-align:center;
  color:#999;
  font-size:12px;
  margin-top:10px;
}

.loading{
  color:#999;
}

</style>

</head>

<body>

<div class="container">

  <div class="card">
    <div class="title">力量調整</div>
    <div id="STRadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">敏捷調整</div>
    <div id="DEXadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">體質調整</div>
    <div id="CONadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">智力調整</div>
    <div id="INTadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">感知調整</div>
    <div id="WISadj" class="value loading">
      Loading...
    </div>
  </div>

  <div class="card">
    <div class="title">魅力調整</div>
    <div id="CHAadj" class="value loading">
      Loading...
    </div>
  </div>

  <div id="updateTime" class="update">
  </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycby4IFQ2_5x9Qwr4TdqZhwkbeYa-vVQd8bD5SDwDyQnkibPfJwppi1RH1vUaHWL5KcEEEw/exec";

fetch(API_URL)
  .then(response => response.json())
  .then(data => {

    document.getElementById("STRadj")
      .innerText = data.STRadj;

    document.getElementById("DEXadj")
      .innerText = data.DEXadj;

    document.getElementById("CONadj")
      .innerText = data.CONadj;

    document.getElementById("INTadj")
      .innerText = data.INTadj;

    document.getElementById("WISadj")
      .innerText = data.WISadj;

    document.getElementById("CHAadj")
      .innerText = data.CHAadj;

    document.getElementById("updateTime")
      .innerText = "更新時間：" + data.updateTime;

  })
  .catch(error => {

    document.getElementById("updateTime")
      .innerText = "資料載入失敗";

    console.error(error);

  });

</script>

</body>
</html>
